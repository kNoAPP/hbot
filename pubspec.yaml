name: hbot
description: A Discord bot.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1
homepage: https://knoban.com

environment:
  sdk: '>=2.17.0 <3.0.0'

dependencies: 
  args: ^2.3.1
  dartz: ^0.10.1
  freezed_annotation: ^2.1.0 
  googleapis: ^9.1.0
  googleapis_auth: ^1.3.1
  json_annotation: ^4.6.0
  logging: ^1.0.2
  nyxx: ^4.0.0
  nyxx_interactions: ^4.3.1

dev_dependencies:
  build_runner: ^2.2.0
  freezed: ^2.1.0+1
  json_serializable: ^6.3.1
  lints: ^2.0.0
  test: ^1.21.6

cider:
  link_template:
    tag: https://github.com/kNoAPP/hbot/releases/tag/v%tag% # initial release link template
    diff: https://github.com/kNoAPP/hbot/compare/v%from%...v%to% # subsequent releases link template


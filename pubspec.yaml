name: hbot
description: A Discord bot.
publish_to: "none" # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1
homepage: https://knoban.com

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  args: ^2.3.1
  dartz: ^0.10.1
  freezed_annotation: ^2.1.0
  google_generative_ai: ^0.2.2
  googleapis: ^13.1.0
  googleapis_auth: ^1.5.1
  json_annotation: ^4.6.0
  logging: ^1.0.2
  nyxx:
    git:
      url: https://github.com/DarpHome/nyxx.git
      ref: feat/hang-status

dev_dependencies:
  build_runner: ^2.2.0
  freezed: ^2.1.0+1
  json_serializable: ^6.3.1
  lints: ^3.0.0
  test: ^1.16.0

cider:
  link_template:
    tag: https://github.com/kNoAPP/hbot/releases/tag/v%tag% # initial release link template
    diff: https://github.com/kNoAPP/hbot/compare/v%from%...v%to% # subsequent releases link template


name: hbot
description: A Discord bot.
publish_to: "none" # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1
homepage: https://knoban.com

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  args: ^2.3.1
  dartz: ^0.10.1
  freezed_annotation: ^3.1.0
  google_generative_ai: ^0.4.6
  googleapis: ^16.0.0
  googleapis_auth: ^2.2.1
  intl: ^0.20.2
  json_annotation: ^4.6.0
  logging: ^1.0.2
  nyxx: ^6.8.1

dev_dependencies:
  build_runner: ^2.2.0
  freezed: ^3.2.5
  json_serializable: ^6.3.1
  lints: ^6.1.0
  test: ^1.16.0

cider:
  link_template:
    tag: https://github.com/kNoAPP/hbot/releases/tag/v%tag% # initial release link template
    diff: https://github.com/kNoAPP/hbot/compare/v%from%...v%to% # subsequent releases link template

